<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaStar Monitor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="logo">N</div>
  <span class="topbar-title">NovaStar Monitor</span>
  <div class="topbar-right">
    <span id="topbar-info">Connecting...</span>
    <div class="pulse" id="pulse-dot"></div>
    <button class="btn btn-sm" onclick="showAddDevice()">+ Add Device</button>
  </div>
</div>

<!-- Add Device Modal -->
<div id="add-device-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <span class="modal-title">Add NovaStar Device</span>
      <button class="modal-close" onclick="hideAddDevice()">&times;</button>
    </div>
    <div class="modal-body">
      <label>Device Name</label>
      <input type="text" id="add-name" placeholder="Main Stage VX1000" class="input">
      <label>IP Address</label>
      <input type="text" id="add-ip" placeholder="192.168.0.10" class="input">
      <label>Port</label>
      <input type="number" id="add-port" value="5200" class="input">
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="hideAddDevice()">Cancel</button>
      <button class="btn btn-primary" onclick="addDevice()">Add Device</button>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="container">
  <!-- Stats Row -->
  <div class="stats-grid" id="stats-grid">
    <div class="stat-card"><div class="stat-label">Devices</div><div class="stat-value color-muted">—</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="errors">Error Log <span class="tab-badge hidden" id="error-badge">0</span></button>
  </div>

  <!-- Dashboard Tab -->
  <div id="tab-dashboard" class="tab-content active">
    <div id="devices-container">
      <div class="section" style="text-align:center;padding:40px;">
        <p class="color-muted">No devices configured.</p>
        <p class="color-muted" style="margin-top:8px;">Click <strong>+ Add Device</strong> to start monitoring.</p>
      </div>
    </div>
  </div>

  <!-- Error Log Tab -->
  <div id="tab-errors" class="tab-content">
    <div class="section">
      <div class="section-title">Error Log</div>
      <div id="error-log" style="max-height:500px;overflow-y:auto;">
        <p class="color-muted" style="padding:20px;text-align:center;">No errors recorded</p>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
